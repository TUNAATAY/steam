<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oyun Merkezi</title>
    <style>
        :root {
            --neon-cyan: #00f2ff;
            --bg-dark: #0a0b10;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(0, 242, 255, 0.2);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: white;
            background-image: radial-gradient(circle at top right, rgba(0, 242, 255, 0.1), transparent 40%);
            min-height: 100vh;
        }

        /* Navigasyon Çubuğu */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 50px;
            background: rgba(10, 11, 16, 0.8);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--glass-border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            color: white;
            text-shadow: 0 0 10px var(--neon-cyan);
            letter-spacing: 2px;
        }

        .search-bar {
            display: flex;
            gap: 10px;
        }

        .search-bar input {
            padding: 10px 15px;
            width: 300px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid var(--glass-border);
            border-radius: 5px;
            color: white;
            outline: none;
            transition: 0.3s;
        }

        .search-bar input:focus {
            border-color: var(--neon-cyan);
            box-shadow: 0 0 10px rgba(0, 242, 255, 0.2);
        }

        .search-bar button {
            padding: 10px 20px;
            background: var(--neon-cyan);
            color: #000;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .search-bar button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px var(--neon-cyan);
        }

        /* Ana İçerik ve Oyun Izgarası */
        .container {
            padding: 40px 50px;
        }

        .section-title {
            font-size: 2rem;
            margin-bottom: 30px;
            color: var(--neon-cyan);
            border-left: 4px solid var(--neon-cyan);
            padding-left: 15px;
        }

        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 30px;
        }

        /* Oyun Kartları (Glassmorphism) */
        .game-card {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 15px;
            overflow: hidden;
            transition: 0.4s;
            cursor: pointer;
        }

        .game-card:hover {
            transform: translateY(-10px);
            border-color: var(--neon-cyan);
            box-shadow: 0 10px 20px rgba(0, 242, 255, 0.15);
        }

        .game-image {
            width: 100%;
            height: 150px;
            background-color: #1a1c23; /* Resim yoksa duracak renk */
            background-size: cover;
            background-position: center;
        }

        .game-info {
            padding: 20px;
        }

        .game-title {
            font-size: 1.2rem;
            margin-bottom: 10px;
            font-weight: bold;
        }

        .game-tags {
            display: flex;
            gap: 10px;
            font-size: 0.8rem;
            color: #aaa;
        }

        .tag {
            background: rgba(0, 242, 255, 0.1);
            color: var(--neon-cyan);
            padding: 4px 8px;
            border-radius: 4px;
            border: 1px solid rgba(0, 242, 255, 0.2);
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">GAME_HUB</div>
        <div class="search-bar">
            <input type="text" placeholder="Oyun, AppID veya Kategori ara...">
            <button>Ara</button>
        </div>
    </nav>

    <div class="container">
        <h2 class="section-title">Popüler Oyunlar</h2>
        
        <div class="game-grid">
            
            <div class="game-card">
                <div class="game-image" style="background-image: url('https://cdn.cloudflare.steamstatic.com/steam/apps/730/header.jpg');"></div>
                <div class="game-info">
                    <div class="game-title">Counter-Strike 2</div>
                    <div class="game-tags">
                        <span class="tag">FPS</span>
                        <span class="tag">Rekabetçi</span>
                    </div>
                </div>
            </div>

            <div class="game-card">
                <div class="game-image" style="background-image: url('https://cdn.cloudflare.steamstatic.com/steam/apps/271590/header.jpg');"></div>
                <div class="game-info">
                    <div class="game-title">Grand Theft Auto V</div>
                    <div class="game-tags">
                        <span class="tag">Açık Dünya</span>
                        <span class="tag">Aksiyon</span>
                    </div>
                </div>
            </div>

            <div class="game-card">
                <div class="game-image" style="background-image: url('https://cdn.cloudflare.steamstatic.com/steam/apps/1091500/header.jpg');"></div>
                <div class="game-info">
                    <div class="game-title">Cyberpunk 2077</div>
                    <div class="game-tags">
                        <span class="tag">RPG</span>
                        <span class="tag">Fütüristik</span>
                    </div>
                </div>
            </div>

            <div class="game-card">
                <div class="game-image" style="background-image: url('https://cdn.cloudflare.steamstatic.com/steam/apps/252490/header.jpg');"></div>
                <div class="game-info">
                    <div class="game-title">Rust</div>
                    <div class="game-tags">
                        <span class="tag">Hayatta Kalma</span>
                        <span class="tag">Multiplayer</span>
                    </div>
                </div>
            </div>

        </div>
    </div>

</body>
</html>
