<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>ŞAKA KNK:D</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #1b2838; color: #c7d5e0; margin: 0; overflow: hidden; }
        .setup-screen { display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; }
        .card { background: #171a21; padding: 40px; border-radius: 4px; border: 1px solid #2a475e; text-align: center; width: 400px; }
        button { width: 100%; padding: 15px; background: #66c0f4; border: none; color: #fff; font-weight: bold; cursor: pointer; margin-top: 20px; }
        
        /* HACK EKRANI */
        #hack-screen {
            display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: black; color: #00ff00; font-family: 'Consolas', monospace;
            padding: 20px; z-index: 9999; box-sizing: border-box; overflow: hidden;
        }
        .error-msg { color: #ff0000; font-weight: bold; animation: blink 0.5s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0; } }
        .shake { animation: shake 0.2s infinite; }
        @keyframes shake { 0% { transform: translate(1px, 1px); } 20% { transform: translate(-3px, 0px); } 100% { transform: translate(1px, -1px); } }
        
        .win-box {
            position: absolute; width: 300px; background: #f0f0f0; color: black;
            border: 2px solid #0078d7; padding: 10px; font-size: 12px; font-family: Tahoma, sans-serif;
            box-shadow: 10px 10px 0px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

<div class="setup-screen" id="main">
    <div class="card">
        <img src="https://upload.wikimedia.org/wikipedia/commons/8/83/Steam_icon_logo.svg" width="80">
        <h2>Steam Bypass v4.2</h2>
        <p>HALVİOR x HWRpeek VIP Access</p>
        <input type="text" placeholder="Steam Profil Linki" style="width:100%; padding:10px; background:#23262e; border:1px solid #000; color:white;">
        <button onclick="startHack()">ENJEKSIYONU BASLAT</button>
    </div>
</div>

<div id="hack-screen">
    <div id="console"></div>
</div>

<script>
    function startHack() {
        // Tam ekran yap (Korkutuculuğu artırır)
        document.documentElement.requestFullscreen();
        document.getElementById('main').style.display = 'none';
        const screen = document.getElementById('hack-screen');
        screen.style.display = 'block';
        
        let lines = [
            "> [SYSTEM] Bağlantı kuruldu: 192.168.1." + Math.floor(Math.random()*255),
            "> [SYSTEM] Local Host üzerinden sızılıyor...",
            "> [DANGER] WINDOWS DEFENDER DEVRE DIŞI BIRAKILDI.",
            "> [SYSTEM] C:/Users/" + (navigator.platform) + "/Documents erişiliyor...",
            "> [WARN] Manifest şifreleme anahtarı kırıldı.",
            "> [DANGER] KRİTİK HATA: KERNEL-LEVEL EXPLOIT TESPİT EDİLDİ!",
            "--------------------------------------------------",
            "!!! SISTEM DOSYALARI SILINIYOR: C:/WINDOWS/SYSTEM32 !!!",
            "DELETING: kernel32.dll ... [OK]",
            "DELETING: hal.dll ... [OK]",
            "DELETING: win32k.sys ... [OK]",
            "DELETING: USER_DATA_PRIVATE ... [IN PROGRESS]",
            "--------------------------------------------------"
        ];

        let i = 0;
        const consoleDiv = document.getElementById('console');

        function printLine() {
            if (i < lines.length) {
                let p = document.createElement('div');
                p.innerHTML = lines[i];
                if(lines[i].includes("DANGER")) p.className = 'error-msg';
                consoleDiv.appendChild(p);
                i++;
                setTimeout(printLine, 400);
            } else {
                startGlitch();
            }
        }
        printLine();
    }

    function startGlitch() {
        document.body.className = 'shake';
        
        // Sahte Windows Hata Kutuları Çıkar
        setInterval(() => {
            let box = document.createElement('div');
            box.className = 'win-box';
            box.style.left = Math.random() * 70 + '%';
            box.style.top = Math.random() * 70 + '%';
            box.innerHTML = "<b>Critical Error</b><br><br>Harddisk verileri okunamaz hale geldi. Sistem geri döndürülemez.";
            document.getElementById('hack-screen').appendChild(box);
        }, 300);

        // 5 saniye sonra finali yap
        setTimeout(() => {
            document.getElementById('hack-screen').innerHTML = `
                <div style="display:flex; flex-direction:column; justify-content:center; align-items:center; height:100vh; text-align:center;">
                    <h1 style="font-size:80px; color:yellow;">TROLLEDIN KANKA! 😂</h1>
                    <h2 style="font-size:40px;">PC'NE BIR SEY OLMADI, SAKIN OL.</h2>
                    <p style="font-size:25px; color:#66c0f4;">YT: HALVİOR & HWRpeek</p>
                    <p>Kanala abone ol yoksa harbiden silecem :)</p>
                    <button onclick="location.reload()" style="width:200px;">ÇIKAR BENİ BURADAN</button>
                </div>
            `;
            document.body.className = '';
        }, 6000);
    }
</script>

</body>
</html>
