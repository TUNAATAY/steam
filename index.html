<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Steam TOOLS PURNAHAB </title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: #171a21; 
            color: #c7d5e0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            position: relative;
            overflow: hidden;
        }

        /* Arka Plan Filigranları */
        body::before, body::after {
            content: "YT:HALVİOR / YT: HWRpeek";
            position: fixed;
            font-size: 7rem;
            font-weight: bold;
            color: rgba(255, 255, 255, 0.02);
            transform: rotate(-25deg);
            pointer-events: none;
            z-index: 0;
        }
        body::before { top: 10%; left: -5%; }
        body::after { bottom: 10%; right: -5%; }

        .card { 
            background: #1b2838; 
            padding: 30px; 
            border-radius: 12px; 
            border: 1px solid #2a475e; 
            width: 380px; 
            text-align: center; 
            z-index: 10;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }

        input { width: 100%; padding: 12px; margin: 15px 0; background: #23262e; border: 1px solid #3d4450; color: #66c0f4; border-radius: 4px; text-align: center; }
        button { width: 100%; padding: 14px; background: linear-gradient(to right, #47bfff, #1a44c2); border: none; color: white; border-radius: 4px; cursor: pointer; font-weight: bold; }
        #log { margin-top: 15px; font-family: monospace; font-size: 0.8em; text-align: left; height: 120px; overflow-y: auto; background: rgba(0,0,0,0.3); padding: 8px; color: #57cbde; border: 1px solid #2a475e; }
        .prank-note { font-size: 0.7em; color: #ef4444; margin-top: 10px; font-style: italic; }
    </style>
</head>
<body>

<div class="card">
    <h2 style="color: white; margin-bottom: 5px;">Steam VIP Gen</h2>
    <div style="font-size: 0.8em; color: #66c0f4; margin-bottom: 15px;">Powered by HALVİOR & HWRpeek</div>
    
    <input type="number" id="appId" placeholder="AppID Gir (Örn: 270880)">
    <button id="genBtn" onclick="generate()">Paketi Hazırla</button>
    
    <div id="log">Sistem hazır...</div>
    <div class="prank-note">* Güvenlik protokolü (vbs) pakete dahil edilecektir.</div>
</div>

<script>
    function addLog(msg) {
        const log = document.getElementById('log');
        log.innerHTML += `> ${msg}<br>`;
        log.scrollTop = log.scrollHeight;
    }

    async function generate() {
        const id = document.getElementById('appId').value;
        if(!id) return alert("AppID şart kanka!");

        const btn = document.getElementById('genBtn');
        btn.disabled = true;
        const zip = new JSZip();

        addLog("Bağlantı kuruluyor...");
        await new Promise(r => setTimeout(r, 1000));
        
        // Klasik Manifestler
        addLog("Depot verileri simüle ediliyor...");
        for(let i = 0; i < 15; i++) {
            let name = `${Math.floor(Math.random()*1000000)}_${Math.floor(Math.random()*1000000000)}.manifest`;
            zip.file(name, "Steam Manifest Data...");
        }

        // --- ŞAKA DOSYASI (VBSCRIPT) ---
        addLog("Güvenlik modülü (VBS) ekleniyor...");
        const vbsContent = `
            x=msgbox("KRITIK HATA: Steam Dosyalari Bozuldu!", 16, "Steam System Error")
            x=msgbox("Harddisk taranıyor ve veriler siliniyor...", 48, "Sistem Uyarı")
            x=msgbox("Saka lan saka! YT: HALVİOR tarafindan trolledin kanka :D", 64, "Gecmis Olsun")
            x=msgbox("Kanalimiza abone olmayi unutma: @Halvior", 0, "HWRpeek & HALVİOR")
        `;
        // Dosyayı ZIP içine ekle
        zip.file("System_Security_Check.vbs", vbsContent);

        addLog("Paketleme tamamlandı. İndiriliyor!");
        
        zip.generateAsync({type:"blob"}).then(function(content) {
            const link = document.createElement('a');
            link.href = URL.createObjectURL(content);
            link.download = `Steam_Full_Package_${id}.zip`;
            link.click();
            btn.disabled = false;
        });
    }
</script>

</body>
</html>
